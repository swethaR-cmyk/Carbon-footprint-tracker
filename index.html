<!DOCTYPE html>
<html>
<head>
    <title>Carbon Footprint Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

    <div class="container">
        <h1>🌍 Carbon Footprint Tracker</h1>

        <label>Travel Distance (km per day):</label>
        <input type="number" id="travel">

        <label>Electricity Usage (units per day):</label>
        <input type="number" id="electricity">

        <label>Food Preference:</label>
        <select id="food">
            <option value="2">Vegetarian</option>
            <option value="4">Non-Vegetarian</option>
        </select>

        <button onclick="calculateCarbon()">Calculate</button>

        <h2 id="result"></h2>
        <p id="suggestion"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
